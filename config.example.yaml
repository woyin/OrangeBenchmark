# OrangeBenchmark 配置文件示例
# 复制为 config.yaml 并填入实际 API Key

providers:
  - name: openai
    base_url: "https://api.openai.com/v1"
    api_key: "sk-xxx..."

  - name: anthropic
    base_url: "https://api.anthropic.com"
    api_key: "sk-ant-xxx..."

models:
  - name: "gpt-4o"
    provider: openai
    model: "gpt-4o"

  - name: "claude-sonnet-4"
    provider: anthropic
    model: "claude-sonnet-4-20250514"

agents:
  - name: "raw-api"
    type: raw
    description: "单轮直接调用模型"

  - name: "claude-code"
    type: agent
    description: "Claude Code CLI"

  - name: "codex"
    type: agent
    description: "OpenAI Codex CLI"

combos:
  - model: "gpt-4o"
    agent: "raw-api"
  - model: "claude-sonnet-4"
    agent: "raw-api"
  - model: "claude-sonnet-4"
    agent: "claude-code"
