name: "csv-stats"
difficulty: easy
category: data
tags: [csv, statistics, file-io, dirty-data]

prompt: |
  Implement analyze_csv(filepath: str) -> dict.
  Read a CSV file and return per-column statistics. Numeric columns must return
  {"mean": float | None, "max": float | None, "min": float | None,
  "null_count": int}. Non-numeric columns must return
  {"type": "non-numeric", "null_count": int}. Missing cells in ragged rows
  count as nulls. Empty files return {}. Write the code in solution.py.

scoring:
  dimensions:
    - name: correctness
      weight: 0.45
    - name: code_quality
      weight: 0.35
    - name: performance
      weight: 0.20
  performance:
    fast_seconds: 1.0
    slow_seconds: 10.0
  correctness_exponent: 4

target_file: "solution.py"
timeout: 30
