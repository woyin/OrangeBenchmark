name: "react-todo-list"
difficulty: easy
category: frontend
tags: [react, crud, list, state]

prompt: |
  Implement a TodoList component in src/TodoList.tsx.
  Features:
  - Text input to add new todos
  - Display list of todos
  - Click todo to toggle complete (strikethrough)
  - Delete button for each todo
  - Filter buttons: All / Active / Completed

  Export: `export default TodoList`

scoring:
  dimensions:
    - name: correctness
      weight: 0.4
    - name: code_quality
      weight: 0.3
    - name: performance
      weight: 0.3

target_file: "src/TodoList.tsx"
copy_paths: ["package.json", "tsconfig.json", "vite.config.ts", "src/test-setup.ts", "src/main.tsx"]
timeout: 60
