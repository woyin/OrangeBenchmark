name: "template-problem"
difficulty: easy              # easy / medium / hard
category: algorithm           # algorithm / web / system / tool-use / ...
tags: [template]

prompt: |
  在这里写任务描述，发给模型/Agent。

scoring:
  dimensions:
    - name: correctness
      weight: 0.45
    - name: code_quality
      weight: 0.35
    - name: performance
      weight: 0.20
  performance:
    fast_seconds: 1.0
    slow_seconds: 10.0
  correctness_exponent: 4

target_file: "solution.py"
timeout: 30
