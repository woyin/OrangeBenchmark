name: "java-palindrome-checker"
difficulty: easy
category: string
tags: [java, string, palindrome]

prompt: |
  Implement a PalindromeChecker class in src/main/java/PalindromeChecker.java.
  Provide a static method `isPalindrome(String s) -> boolean` that checks if s is a palindrome.
  Ignore non-alphanumeric characters and case. Return false for null.

scoring:
  dimensions:
    - name: correctness
      weight: 0.4
    - name: code_quality
      weight: 0.3
    - name: performance
      weight: 0.3

target_file: "src/main/java/PalindromeChecker.java"
copy_paths: ["pom.xml", "src"]
timeout: 30
