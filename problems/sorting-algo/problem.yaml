name: "sorting-algo"
difficulty: medium
category: algorithm
tags: [sorting, algorithm, performance]

prompt: |
  实现一个 merge_sort 函数，接受一个整数列表，
  返回排序后的列表。要求时间复杂度 O(n log n)。
  将代码写入 solution.py 文件，定义函数 merge_sort(arr: list[int]) -> list[int]。

scoring:
  dimensions:
    - name: correctness
      weight: 0.5
    - name: code_quality
      weight: 0.3
    - name: performance
      weight: 0.2

target_file: "solution.py"
timeout: 30
